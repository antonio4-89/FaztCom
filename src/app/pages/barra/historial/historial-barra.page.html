<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Historial Barra</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h1 class="fc-h1" style="margin-bottom:20px">Historial &mdash; Barra</h1>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div *ngFor="let c of comandas" class="fc-card" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="fc-h3">#{{ c.id }}</span>
        <span class="fc-muted" style="font-size:12px">Mesa {{ c.nota?.mesa?.identifier || '—' }}</span>
        <span class="badge" [class.sec-T]="c.nota?.mesa?.seccion === 'T'" [class.sec-PM]="c.nota?.mesa?.seccion === 'PM'">
          {{ c.nota?.mesa?.seccion === 'T' ? 'Terraza' : 'PM/Sala' }}
        </span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="fc-muted" style="font-size:11px">{{ c.nota?.mesero?.name }} &middot; {{ c.createdAt | date:'HH:mm' }}</span>
        <span class="badge badge-entregado">Entregado</span>
      </div>
    </div>
    <p *ngIf="!loading && comandas.length === 0" style="text-align:center;padding:60px 20px;color:var(--fc-muted)">
      Sin historial aún
    </p>
  </div>
</ion-content>
