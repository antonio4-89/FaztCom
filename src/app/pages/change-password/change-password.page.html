<ion-header>
  <ion-toolbar>
    <ion-title>Establece tu contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" style="--background:var(--fc-bg)">
  <div class="cp-container">
    <div class="cp-card fc-card">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:48px;margin-bottom:8px">🔐</div>
        <h1 class="fc-h2">Primera vez que ingresas</h1>
        <p class="fc-muted" style="font-size:13px;margin-top:6px">
          Por seguridad, establece una nueva contraseña para tu cuenta.
        </p>
      </div>

      <div class="field">
        <label class="fc-muted" style="font-size:12px;margin-bottom:4px;display:block">Nueva contraseña</label>
        <div class="input-wrap">
          <input [type]="showPass ? 'text' : 'password'" [(ngModel)]="newPassword"
                 placeholder="Mínimo 6 caracteres" class="fc-input"/>
          <button class="show-btn" (click)="showPass = !showPass">
            {{ showPass ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <div class="field" style="margin-top:12px">
        <label class="fc-muted" style="font-size:12px;margin-bottom:4px;display:block">Confirmar contraseña</label>
        <input type="password" [(ngModel)]="confirmPassword"
               placeholder="Repite la contraseña" class="fc-input"/>
      </div>

      <button class="btn-primary full" style="margin-top:20px;justify-content:center"
              (click)="save()" [disabled]="loading || !newPassword || !confirmPassword">
        {{ loading ? 'Guardando...' : 'Establecer contraseña' }}
      </button>
    </div>
  </div>
</ion-content>
