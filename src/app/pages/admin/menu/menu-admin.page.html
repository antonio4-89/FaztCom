<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Menú</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <h1 class="fc-h1">Menú</h1>
    <button class="btn-primary" (click)="newProducto()">+ Agregar producto</button>
  </div>

  <div *ngFor="let tipo of tipoKeys" style="margin-bottom:28px">
    <h2 class="fc-h2" style="margin-bottom:14px">
      {{ tipo === 'comida' ? '🍔 Comida' : '🥤 Bebidas' }}
    </h2>

    <div *ngFor="let grp of menu[tipo]" style="margin-bottom:18px">
      <div class="cat-label">{{ grp.cat }}</div>
      <div class="prod-grid">
        <div *ngFor="let p of grp.items" class="fc-card prod-card">
          <div>
            <div style="font-weight:500;font-size:12px">{{ p.name }}</div>
            <div *ngIf="p.price > 0" style="color:var(--fc-accent);font-weight:700;font-size:12px;margin-top:2px">${{ p.price }}</div>
            <div *ngIf="p.price === 0" class="fc-dim" style="font-size:10px;margin-top:2px">Sin precio</div>
          </div>
          <div style="display:flex;gap:4px">
            <button class="icon-btn" (click)="editProducto(p)" title="Editar">✏️</button>
            <button class="icon-btn" (click)="deleteProducto(p)" title="Eliminar">🗑</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" style="text-align:center;padding:60px;color:var(--fc-muted)">Cargando menú...</div>
</ion-content>
