<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Menú</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <h1 class="fc-h1">Menú</h1>
    <button class="btn-primary" (click)="openNewForm()">+ Agregar producto</button>
  </div>

  <!-- Inline new product form -->
  <div *ngIf="formVisible" class="fc-card form-card anim-up" style="margin-bottom:16px">
    <h2 class="fc-h2" style="margin-bottom:12px">Nuevo Producto</h2>
    <div class="form-fields">
      <div class="field">
        <label class="field-label">Nombre</label>
        <input class="fc-input" [(ngModel)]="fName" placeholder="Nombre del producto"/>
      </div>
      <div class="form-row">
        <div class="field" style="flex:1">
          <label class="field-label">Tipo</label>
          <ion-select class="fc-select" interface="popover" [(ngModel)]="fTipo" (ionChange)="onTipoChange()" placeholder="Tipo">
            <ion-select-option value="comida">Comida</ion-select-option>
            <ion-select-option value="bebida">Bebida</ion-select-option>
          </ion-select>
        </div>
        <div class="field" style="flex:1">
          <label class="field-label">Categoría</label>
          <ion-select class="fc-select" interface="popover" [(ngModel)]="fCategoria" placeholder="Seleccionar categoría">
            <ion-select-option *ngFor="let cat of categoriasForTipo" [value]="cat">{{ cat }}</ion-select-option>
            <ion-select-option value="__new__">+ Nueva categoría</ion-select-option>
          </ion-select>
        </div>
      </div>
      <div class="field" *ngIf="fCategoria === '__new__'">
        <label class="field-label">Nombre de nueva categoría</label>
        <input class="fc-input" [(ngModel)]="fNewCategoria" placeholder="Ej: Ensaladas, Smoothies..."/>
      </div>
      <div class="field">
        <label class="field-label">Precio</label>
        <input class="fc-input" type="number" [(ngModel)]="fPrice" placeholder="0"/>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-primary" (click)="submitNewProduct()">Agregar</button>
      <button class="btn-soft btn-danger" (click)="formVisible = false">Cancelar</button>
    </div>
  </div>

  <div *ngIf="loading" style="text-align:center;padding:60px">
    <ion-spinner name="crescent" color="warning"></ion-spinner>
  </div>

  <div *ngFor="let tipo of tipoKeys" style="margin-bottom:28px">
    <h2 class="fc-h2" style="margin-bottom:14px">
      <ion-icon [name]="tipo === 'comida' ? 'restaurant-outline' : 'beer-outline'" style="vertical-align:middle;margin-right:4px"></ion-icon>
      {{ tipo === 'comida' ? 'Comida' : 'Bebidas' }}
    </h2>

    <div *ngFor="let grp of menu[tipo]" style="margin-bottom:18px">
      <div class="cat-label">{{ grp.cat }}</div>
      <div class="prod-grid">
        <div *ngFor="let p of grp.items" class="fc-card prod-card" [class.is-agotado]="p.agotado">
          <div style="flex:1;min-width:0">
            <div style="font-weight:500;font-size:12px">{{ p.name }}</div>
            <div *ngIf="p.price > 0" style="color:var(--fc-accent);font-weight:700;font-size:12px;margin-top:2px">${{ p.price }}</div>
            <span *ngIf="p.agotado" class="agotado-tag">AGOTADO</span>
          </div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
            <button class="icon-btn stock-btn" [class.active-agotado]="p.agotado"
                    (click)="toggleAgotado(p)" [title]="p.agotado ? 'Marcar disponible' : 'Marcar agotado'">
              <ion-icon [name]="p.agotado ? 'checkmark-circle-outline' : 'close-circle-outline'"></ion-icon>
            </button>
            <button class="icon-btn" (click)="editProducto(p)" title="Editar"><ion-icon name="create-outline"></ion-icon></button>
            <button class="icon-btn" (click)="deleteProducto(p)" title="Eliminar"><ion-icon name="trash-outline"></ion-icon></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
