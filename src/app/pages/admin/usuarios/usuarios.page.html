<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Usuarios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:10px">
    <h1 class="fc-h1">Usuarios</h1>
    <button class="btn-primary" (click)="openForm()">+ Registrar usuario</button>
  </div>
  <p class="fc-muted" style="margin-bottom:20px">Al registrar, se enviará un código de acceso al correo del usuario.</p>

  <!-- INLINE FORM (crear / editar) -->
  <div *ngIf="formVisible" class="fc-card form-card anim-up" style="margin-bottom:16px">
    <h2 class="fc-h2" style="margin-bottom:12px">{{ editingUser ? 'Editar Usuario' : 'Registrar Usuario' }}</h2>

    <div class="form-fields">
      <div class="field">
        <label class="field-label">Nombre completo</label>
        <input class="fc-input" [(ngModel)]="formName" placeholder="Nombre del usuario"/>
      </div>

      <div class="field" *ngIf="!editingUser">
        <label class="field-label">Correo electrónico</label>
        <input class="fc-input" type="email" [(ngModel)]="formEmail" placeholder="correo@fastcom.mx"/>
      </div>

      <div class="field">
        <label class="field-label">Rol</label>
        <ion-select
          class="fc-select"
          interface="popover"
          [(ngModel)]="formRole"
          placeholder="Seleccionar rol">
          <ion-select-option value="admin">Admin</ion-select-option>
          <ion-select-option value="mesero">Mesero</ion-select-option>
          <ion-select-option value="cocinero">Cocinero</ion-select-option>
          <ion-select-option value="bartender">Bartender</ion-select-option>
        </ion-select>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-primary" (click)="submitForm()" [disabled]="formLoading">
        {{ formLoading ? 'Guardando...' : (editingUser ? 'Guardar' : 'Registrar') }}
      </button>
      <button class="btn-soft btn-danger" (click)="cancelForm()">Cancelar</button>
    </div>
  </div>

  <div *ngIf="loading" style="text-align:center;padding:40px">
    <ion-spinner name="crescent" color="warning"></ion-spinner>
  </div>

  <div style="display:flex;flex-direction:column;gap:8px">
    <div *ngFor="let u of usuarios" class="fc-card user-row">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="avatar" [ngClass]="'role-' + u.role"><ion-icon [name]="roleIcon(u.role)" style="font-size:18px"></ion-icon></div>
        <div>
          <div style="font-weight:500;font-size:13px">{{ u.name }}</div>
          <div class="fc-muted" style="font-size:11px;margin-top:1px">{{ u.email }}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge" [ngClass]="roleBadgeClass(u.role)">{{ u.role }}</span>
        <button class="icon-btn" (click)="editUsuario(u)" title="Editar"><ion-icon name="create-outline"></ion-icon></button>
        <button class="icon-btn btn-del" (click)="deleteUsuario(u)" title="Eliminar"><ion-icon name="trash-outline"></ion-icon></button>
      </div>
    </div>
    <p *ngIf="!loading && usuarios.length === 0" class="fc-muted" style="text-align:center;padding:40px">Sin usuarios</p>
  </div>
</ion-content>
